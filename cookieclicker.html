<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker | Edición GitHub</title>
    <style>
        /* Estilos para que el juego ocupe toda la pantalla sin bordes */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, #ffcc00, #ff6600);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="loading-bar"></div>

    <iframe 
        src="https://orteil.dashnet.org/cookieclicker/" 
        allow="fullscreen"
        title="Cookie Clicker">
    </iframe>

</body>
</html>
